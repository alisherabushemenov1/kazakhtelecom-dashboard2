services:
  - type: web
    name: kazakhtelecom-dashboard
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && bash ../scripts/render-build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
